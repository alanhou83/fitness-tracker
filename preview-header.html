<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; font-family: 'DM Mono', monospace; padding: 20px; }
  .label { color: #666; font-size: 11px; margin-bottom: 12px; letter-spacing: 1px; }
  .divider { border: none; border-top: 1px solid #2a2a2a; margin: 28px 0; }

  .header {
    padding: 16px 16px 0;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
  }
  .header-left { flex: 1; min-width: 0; }
  .hdate { font-size: 11px; color: #666; letter-spacing: 2px; }
  .htitle { font-size: 20px; font-weight: 700; margin-top: 2px; color: #fff; }

  .streak-badge {
    display: flex; flex-direction: column; align-items: center;
    background: #2a2a1a; border: 1px solid #4a4a20;
    border-radius: 10px; padding: 6px 10px; min-width: 54px; flex-shrink: 0;
  }
  .streak-badge .num { font-size: 20px; font-weight: 500; color: #c8f060; line-height: 1; }
  .streak-badge .lbl { font-size: 9px; color: #c8f060; margin-top: 2px; letter-spacing: 1px; }

  /* 现在：有底框的徽章 */
  .ach-badge-old {
    display: flex; flex-direction: column; align-items: center;
    background: #221a0a; border: 1px solid #5a3a10;
    border-radius: 10px; padding: 6px 12px; flex-shrink: 0;
  }
  .ach-badge-old .icons { font-size: 12px; line-height: 1; letter-spacing: 1px; }
  .ach-badge-old .lbl { font-size: 9px; color: #a07030; margin-top: 3px; letter-spacing: 1px; }

  /* 新方案：纯文字，跟在标题旁边 */
  .ach-inline {
    font-size: 12px;
    color: #888;
    margin-top: 5px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="label">▌现在：有底框，高度和连续天不一致</div>
<div class="header">
  <div class="header-left">
    <div class="hdate">2026年5月30日 周六</div>
    <div class="htitle">训练记录</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
    <div class="ach-badge-old">
      <div class="icons">🏆×1 🥈×1</div>
      <div class="lbl">今日成就</div>
    </div>
    <div class="streak-badge">
      <div class="num">5</div>
      <div class="lbl">连续天</div>
    </div>
  </div>
</div>

<hr class="divider">

<div class="label">▌新方案：无底框，成就跟在标题下方，右侧只保留连续天</div>
<div class="header">
  <div class="header-left">
    <div class="hdate">2026年5月30日 周六</div>
    <div class="htitle">训练记录</div>
    <div class="ach-inline">🏆×1 🥈×1</div>
  </div>
  <div style="flex-shrink:0">
    <div class="streak-badge">
      <div class="num">5</div>
      <div class="lbl">连续天</div>
    </div>
  </div>
</div>

</body>
</html>
